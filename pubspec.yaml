name: flutter_api_services
description: >
  A plug-and-play HTTP client for Flutter. Handles authentication, token refresh,
  multipart uploads, all HTTP methods, and every status code — zero boilerplate.
version: 1.0.0
homepage: https://github.com/yourusername/flutter_api_services
repository: https://github.com/yourusername/flutter_api_services
issue_tracker: https://github.com/yourusername/flutter_api_services/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.9
